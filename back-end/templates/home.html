<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
</head>
<body>
    {% if current_user.is_authenticated %}
        <h1>VOCE ESTÁ LOGADO.<br>OLÁ {{ current_user.nome }}!</h1>
        <p><a href="/logout">Logout</a></p>
    {% else %}
        <h1>VOCE NÃO ESTÁ LOGADO.<br>TENTE NOVAMENTE!</h1>
        <p>Clique aqui para Login: <a href="/login">Login</a></p>
    {% endif %}
</body>
</html>
